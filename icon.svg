<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b9d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c233ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bookGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb347;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b9d;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGradient)"/>

  <!-- Open book/flashcard -->
  <g transform="translate(256, 256)">
    <!-- Left page -->
    <path d="M -80 -60 Q -100 -60 -100 -40 L -100 100 Q -100 120 -80 120 L 0 120 L 0 -60 Z" fill="#FFF" opacity="0.95" filter="drop-shadow(0 10px 30px rgba(0,0,0,0.2))"/>

    <!-- Right page -->
    <path d="M 0 -60 L 80 -60 Q 100 -60 100 -40 L 100 100 Q 100 120 80 120 L 0 120 Z" fill="url(#bookGradient)" opacity="0.95" filter="drop-shadow(0 10px 30px rgba(0,0,0,0.2))"/>

    <!-- Spine -->
    <rect x="-5" y="-60" width="10" height="180" fill="#c233ff" opacity="0.6"/>

    <!-- Left page lines (representing text) -->
    <line x1="-80" y1="-20" x2="-20" y2="-20" stroke="#ddd" stroke-width="3" stroke-linecap="round"/>
    <line x1="-80" y1="5" x2="-20" y2="5" stroke="#ddd" stroke-width="3" stroke-linecap="round"/>
    <line x1="-80" y1="30" x2="-20" y2="30" stroke="#ddd" stroke-width="3" stroke-linecap="round"/>
    <line x1="-80" y1="55" x2="-40" y2="55" stroke="#ddd" stroke-width="3" stroke-linecap="round"/>

    <!-- Right page emoji and text -->
    <text x="0" y="30" font-size="80" text-anchor="middle" dominant-baseline="middle">📚</text>
  </g>
</svg>
