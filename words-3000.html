<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#8B5CF6">
    <meta name="description" content="3000 German Words - A Deutsch Dino Flashcard App">
    <title>3000 German Words 🇩🇪</title>
    <link href="https://cdn.tailwindcss.com" rel="stylesheet">
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

        .card-container {
            perspective: 1000px;
            cursor: pointer;
        }
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        .card-container.flipped .card-inner {
            transform: rotateY(180deg);
        }
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between; /* Changed to space-between */
            padding: 1.5rem; /* Increased padding */
            border-radius: 2rem;
        }
        .card-back {
            transform: rotateY(180deg);
        }

        img.word-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 1.5rem;
            background: #f0f0f0;
        }
        .emoji-fallback {
            font-size: 8rem; /* Larger emoji */
            text-align: center;
            line-height: 1;
        }

        .hover-lift {
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s ease;
        }
        .hover-lift:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 12px 24px rgba(0,0,0,0.15);
        }
        .hover-lift:active {
            transform: translateY(0) scale(0.98);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.1);
        }

        .text-clamp {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 via-purple-50 to-pink-50 min-h-screen text-gray-800">
    <div id="app" class="max-w-md mx-auto relative min-h-screen flex flex-col shadow-2xl bg-white/40 overflow-hidden"></div>

    <script>
        const app = document.getElementById("app");
        let VOCABULARY_DB = {};
        let appState = {
            screen: "loading",
            selectedCategory: null,
            currentCardIndex: 0,
            deck: [],
            score: 0,
            completedWords: new Set(),
            synth: window.speechSynthesis || null,
        };

        function speakGerman(text) {
            if (!appState.synth) return;
            appState.synth.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = "de-DE";
            utterance.rate = 0.9;
            utterance.pitch = 1.2;
            appState.synth.speak(utterance);
        }

        function shuffleArray(arr) {
            const copy = [...arr];
            for (let i = copy.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [copy[i], copy[j]] = [copy[j], copy[i]];
            }
            return copy;
        }

        function renderLoading() {
            app.innerHTML = `
                <div class="flex-1 flex flex-col items-center justify-center p-8 text-center">
                    <div class="text-6xl animate-spin mb-8">⚙️</div>
                    <h1 class="text-2xl font-bold text-gray-700">Loading Vocabulary...</h1>
                    <p class="text-gray-500 mt-2">Getting the 3000 words ready for you!</p>
                </div>
            `;
        }

        function renderError(error) {
            app.innerHTML = `
                <div class="flex-1 flex flex-col items-center justify-center p-8 text-center">
                    <div class="text-6xl mb-8">😭</div>
                    <h1 class="text-2xl font-bold text-red-600">Failed to Load</h1>
                    <p class="text-gray-500 mt-2">Could not fetch 'words-3000.json'. Please check the file and your connection.</p>
                    <pre class="mt-4 text-xs text-left bg-red-50 p-4 rounded-lg text-red-700 overflow-auto">${error}</pre>
                    <a href="index.html" class="mt-8 bg-indigo-600 text-white font-bold py-3 px-6 rounded-xl shadow-lg hover-lift">
                        Back to Main App
                    </a>
                </div>
            `;
        }

        function renderHome() {
            appState.screen = "home";
            const categories = Object.entries(VOCABULARY_DB).map(([key, cat]) => ({
                key,
                name: cat.name,
                emoji: cat.emoji,
                color: cat.color,
                count: cat.words.length
            }));

            app.innerHTML = `
                <div class="flex-1 overflow-y-auto px-4 py-8 pb-32">
                    <div class="text-center mb-10 mt-6">
                        <div class="inline-block p-4 rounded-full bg-white shadow-xl mb-4">
                            <span class="text-6xl">📚</span>
                        </div>
                        <h1 class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600 mb-2 tracking-tight">3000 German Words</h1>
                        <p class="text-gray-600 font-medium">Expand your vocabulary</p>
                    </div>

                    <div class="grid grid-cols-2 gap-4 sm:gap-5 mb-8">
                        ${categories.map(cat => `
                            <button class="category-btn hover-lift bg-gradient-to-br ${cat.color} rounded-2xl sm:rounded-3xl p-4 sm:p-5 text-white font-bold text-center shadow-lg border border-white/20 flex flex-col items-center justify-center h-full" data-category="${cat.key}">
                                <div class="text-4xl sm:text-5xl mb-2 sm:mb-3 drop-shadow-md">${cat.emoji}</div>
                                <div class="text-xs sm:text-sm font-bold tracking-wide w-full px-1">${cat.name.split(" & ")[0]}</div>
                                <div class="text-[10px] sm:text-xs opacity-80 mt-1">${cat.count} words</div>
                            </button>
                        `).join("")}
                    </div>
                </div>

                <div class="absolute bottom-0 left-0 right-0 p-4 pb-8 glass-panel rounded-t-3xl z-10">
                    <a href="index.html" class="flex items-center justify-center w-full bg-white text-indigo-600 font-bold py-4 px-6 rounded-2xl text-lg shadow-xl hover-lift">
                        <span class="text-2xl mr-3">🏠</span>
                        Back to Main App
                    </a>
                </div>
            `;

            document.querySelectorAll(".category-btn").forEach(btn => {
                btn.addEventListener("click", () => startGame(btn.dataset.category));
            });
        }

        function startGame(categoryKey) {
            const category = VOCABULARY_DB[categoryKey];
            appState.selectedCategory = categoryKey;
            appState.deck = shuffleArray(category.words);
            appState.currentCardIndex = 0;
            appState.score = 0;
            appState.completedWords.clear();
            appState.screen = "game";
            renderGame();
        }

        function renderGame() {
            const category = VOCABULARY_DB[appState.selectedCategory];
            const currentCard = appState.deck[appState.currentCardIndex];
            const totalCards = appState.deck.length;
            const progress = ((appState.completedWords.size) / totalCards) * 100;

            if (appState.currentCardIndex >= totalCards) {
                renderComplete();
                return;
            }

            app.innerHTML = `
                <div class="flex-1 flex flex-col px-4 sm:px-5 py-4 sm:py-6 h-full max-h-screen overflow-hidden">
                    <!-- Header -->
                    <div class="flex justify-between items-center mb-4 sm:mb-6 glass-panel p-2 sm:p-3 rounded-2xl shrink-0">
                        <button class="home-btn hover-lift bg-white text-gray-800 rounded-xl p-2 sm:p-3 shadow-sm border border-gray-100" title="Back to categories">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 sm:h-6 sm:w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
                        </button>
                        <div class="text-center flex-1 mx-2 sm:mx-4 overflow-hidden">
                            <h2 class="text-lg sm:text-xl font-bold text-gray-800 tracking-tight truncate">${category.emoji} ${category.name.split(" & ")[0]}</h2>
                            <p class="text-[10px] sm:text-xs font-bold text-gray-400 tracking-widest uppercase mt-0.5 sm:mt-1">${appState.completedWords.size + 1} OF ${totalCards}</p>
                        </div>
                        <div class="bg-yellow-100 text-yellow-700 border border-yellow-200 rounded-xl px-3 sm:px-4 py-1.5 sm:py-2 font-black text-base sm:text-lg shadow-sm flex items-center">
                            <span class="mr-1">⭐</span> ${appState.score}
                        </div>
                    </div>

                    <!-- Progress bar -->
                    <div class="w-full bg-gray-200/50 rounded-full h-2 sm:h-2.5 mb-4 sm:mb-8 overflow-hidden shadow-inner backdrop-blur-sm shrink-0">
                        <div class="bg-gradient-to-r from-purple-500 to-pink-500 h-full transition-all duration-500 ease-out" style="width: ${progress}%"></div>
                    </div>

                    <!-- Card -->
                    <div class="flex-1 flex items-center justify-center mb-6 sm:mb-8 min-h-0">
                        <div class="card-container hover-lift w-full max-w-sm h-full max-h-[60vh] sm:max-h-[70vh]" id="card">
                            <div class="card-inner">
                                <!-- Front -->
                                <div class="card-front bg-white rounded-[2rem] sm:rounded-[2.5rem] shadow-2xl border border-gray-100 p-4 sm:p-6 overflow-y-auto custom-scrollbar">
                                    <div class="flex-grow w-full h-3/5 mb-4 flex items-center justify-center">
                                        ${currentCard.img ? `
                                            <img src="${currentCard.img}"
                                                 alt="${currentCard.en}"
                                                 loading="lazy"
                                                 class="word-image max-w-full max-h-full object-contain"
                                                 onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
                                            <div class="emoji-fallback hidden items-center justify-center h-full">${currentCard.emoji || '🎯'}</div>
                                        ` : `<div class="emoji-fallback flex items-center justify-center h-full">${currentCard.emoji || '🎯'}</div>`}
                                    </div>
                                    <div class="text-2xl sm:text-3xl md:text-4xl font-black text-gray-800 text-center tracking-tight w-full break-words text-clamp">${currentCard.en}</div>
                                    <div class="flex items-center text-[10px] sm:text-xs font-bold text-purple-400 uppercase tracking-widest bg-purple-50 px-3 sm:px-4 py-1.5 sm:py-2 rounded-full mt-4">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 sm:h-4 sm:w-4 mr-1 animate-pulse" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122" /></svg>
                                        Tap to flip
                                    </div>
                                </div>
                                <!-- Back -->
                                <div class="card-back bg-gradient-to-br from-purple-600 to-indigo-700 rounded-[2rem] sm:rounded-[2.5rem] shadow-2xl border border-white/20 text-white p-4 sm:p-6 overflow-y-auto custom-scrollbar">
                                    <div class="flex-grow flex items-center justify-center">
                                        <div class="emoji-fallback drop-shadow-xl">${currentCard.emoji || '🇩🇪'}</div>
                                    </div>
                                    <div class="text-2xl sm:text-3xl md:text-4xl font-black text-center tracking-tight w-full break-words text-clamp">${currentCard.de}</div>
                                    <div class="flex items-center text-[10px] sm:text-xs font-bold text-white uppercase tracking-widest bg-white/20 px-3 sm:px-4 py-1.5 sm:py-2 rounded-full backdrop-blur-md mt-4">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 sm:h-4 sm:w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" /></svg>
                                        Tap to hear
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Action buttons -->
                    <div class="grid grid-cols-2 gap-3 sm:gap-4 shrink-0 pb-2">
                        <button class="try-again-btn hover-lift bg-white border-2 border-red-100 hover:border-red-200 text-red-500 font-bold py-3 sm:py-4 px-2 sm:px-4 rounded-xl sm:rounded-2xl text-base sm:text-lg shadow-sm flex flex-col items-center justify-center transition-colors">
                            <span class="text-xl sm:text-2xl mb-0.5 sm:mb-1">🔄</span>
                            <span class="text-[10px] sm:text-sm">Review Again</span>
                        </button>
                        <button class="know-it-btn hover-lift bg-gradient-to-br from-green-400 to-emerald-500 text-white font-bold py-3 sm:py-4 px-2 sm:px-4 rounded-xl sm:rounded-2xl text-base sm:text-lg shadow-lg shadow-green-200 flex flex-col items-center justify-center">
                            <span class="text-xl sm:text-2xl mb-0.5 sm:mb-1">✨</span>
                            <span class="text-[10px] sm:text-sm">Got It!</span>
                        </button>
                    </div>
                </div>
                <style>
                    .custom-scrollbar::-webkit-scrollbar {
                        width: 4px;
                    }
                    .custom-scrollbar::-webkit-scrollbar-track {
                        background: transparent;
                    }
                    .custom-scrollbar::-webkit-scrollbar-thumb {
                        background: rgba(0,0,0,0.1);
                        border-radius: 4px;
                    }
                    .card-back .custom-scrollbar::-webkit-scrollbar-thumb {
                        background: rgba(255,255,255,0.2);
                    }
                </style>
            `;

            const cardContainer = document.getElementById("card");
            cardContainer.addEventListener("click", () => {
                cardContainer.classList.toggle("flipped");
                if (cardContainer.classList.contains("flipped")) {
                    speakGerman(currentCard.de);
                }
            });

            document.querySelector(".know-it-btn").addEventListener("click", () => {
                appState.score++;
                appState.completedWords.add(appState.currentCardIndex);
                appState.currentCardIndex++;
                setTimeout(() => renderGame(), 100);
            });

            document.querySelector(".try-again-btn").addEventListener("click", () => {
                appState.deck.push(appState.deck.splice(appState.currentCardIndex, 1)[0]);
                renderGame();
            });

            document.querySelector(".home-btn").addEventListener("click", renderHome);
        }

        function renderComplete() {
            const category = VOCABULARY_DB[appState.selectedCategory];
            app.innerHTML = `
                <div class="min-h-screen flex flex-col items-center justify-center px-6 py-8 bg-gradient-to-b from-purple-600 to-indigo-800 text-white text-center">
                    <div class="text-8xl sm:text-9xl mb-6 sm:mb-8 animate-bounce drop-shadow-2xl">🏆</div>
                    <h1 class="text-4xl sm:text-5xl font-black mb-3 sm:mb-4 tracking-tight">Wunderbar!</h1>
                    <p class="text-lg sm:text-xl text-purple-200 mb-8 sm:mb-10 font-medium">You finished the ${category.name.split(" & ")[0]} set!</p>

                    <div class="bg-white/10 backdrop-blur-md rounded-[2rem] sm:rounded-[2.5rem] p-6 sm:p-8 mb-10 sm:mb-12 shadow-2xl border border-white/20 w-full max-w-sm">
                        <p class="text-xs sm:text-sm font-bold uppercase tracking-widest text-purple-300 mb-2">Total Score</p>
                        <div class="flex items-center justify-center text-6xl sm:text-7xl font-black">
                            <span class="text-yellow-400 mr-2 sm:mr-3 drop-shadow-lg">⭐</span> ${appState.score}
                        </div>
                    </div>

                    <div class="w-full max-w-sm space-y-3 sm:space-y-4">
                        <button class="replay-btn hover-lift w-full bg-white text-indigo-700 font-black py-4 sm:py-5 px-6 sm:px-8 rounded-xl sm:rounded-2xl text-lg sm:text-xl shadow-xl flex items-center justify-center">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 sm:h-6 sm:w-6 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                            Play Again
                        </button>
                        <button class="home-btn-final hover-lift w-full bg-indigo-900/50 border border-white/10 text-white font-bold py-4 sm:py-5 px-6 sm:px-8 rounded-xl sm:rounded-2xl text-base sm:text-lg shadow-lg flex items-center justify-center transition-colors hover:bg-indigo-900/70">
                            Choose New Category
                        </button>
                    </div>
                </div>
            `;

            document.querySelector(".replay-btn").addEventListener("click", () => startGame(appState.selectedCategory));
            document.querySelector(".home-btn-final").addEventListener("click", renderHome);
        }

        // Initial Load
        (async () => {
            renderLoading();
            try {
                const response = await fetch("words-3000.json");
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                VOCABULARY_DB = await response.json();
                renderHome();
            } catch (e) {
                console.error(e);
                renderError(e);
            }
        })();
    </script>
</body>
</html>
