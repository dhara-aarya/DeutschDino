    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

        /* Article color coding */
        .article-der { @apply text-blue-600 font-bold; }
        .article-die { @apply text-red-600 font-bold; }
        .article-das { @apply text-green-600 font-bold; }

        /* 3D Card flip animation */
        .card-container {
            perspective: 1000px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            display: flex;
        }
        .card-container.flipped .card-inner {
            transform: rotateY(180deg);
        }
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .card-back {
            transform: rotateY(180deg);
        }

        /* Celebratory confetti */
        @keyframes confetti-fall {
            0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
        .confetti {
            position: fixed;
            pointer-events: none;
            font-size: 2rem;
            animation: confetti-fall 2.5s ease-in forwards;
        }

        /* Star burst animation */
        @keyframes star-burst {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(1); opacity: 0; }
        }
        .star-burst {
            position: absolute;
            animation: star-burst 0.6s ease-out forwards;
            font-size: 3rem;
            pointer-events: none;
        }

        /* Smooth transitions */
        .transition-all { transition: all 0.3s ease; }

        /* Safe area for notch devices */
        @supports (padding: max(0px)) {
            body { padding-top: max(12px, env(safe-area-inset-top)); padding-bottom: max(12px, env(safe-area-inset-bottom)); }
        }

        // ============ LOAD EXTENDED VOCABULARY ============
        async function loadExtendedVocab() {
            try {
                const response = await fetch('vocab-extended.json');
                if (response.ok) {
                    const extendedData = await response.json();
                    // Merge extended data with core data (extended overwrites core)
                    Object.keys(extendedData).forEach(key => {
                        if (VOCABULARY_DB[key]) {
                            VOCABULARY_DB[key].words = extendedData[key].words;
                        }
                    });
                    appState.extendedVocabLoaded = true;
                    console.log('✅ Extended vocabulary loaded');
                }
            } catch (e) {
                console.log('ℹ️ Extended vocabulary not available (using core words)');
            }
        }

        // ============ APP STATE ============
        const appState = {
            currentScreen: "home",
            selectedCategory: null,
            currentCardIndex: 0,
            score: 0,
            deck: [],
            completedWords: new Set(),
            synth: window.speechSynthesis || null,
            extendedVocabLoaded: false
        };

        // ============ UTILITIES ============
        function getArticleClass(article) {
            const classes = { der: "article-der", die: "article-die", das: "article-das" };
            return classes[article] || "";
        }

        function speakGerman(text) {
            if (!appState.synth) return;
            appState.synth.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = "de-DE";
            utterance.rate = 0.9;
            utterance.pitch = 1.2;
            appState.synth.speak(utterance);
        }

        function createConfetti() {
            const emojis = ["⭐", "🎉", "🎊", "✨", "🌟"];
            for (let i = 0; i < 30; i++) {
                const confetti = document.createElement("div");
                confetti.className = "confetti";
                confetti.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                confetti.style.left = Math.random() * 100 + "%";
                confetti.style.delay = Math.random() * 0.3 + "s";
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 3000);
            }
        }

        function createStarBurst(event) {
            const rect = event.target.getBoundingClientRect();
            for (let i = 0; i < 8; i++) {
                const star = document.createElement("div");
                star.className = "star-burst";
                star.textContent = "⭐";
                star.style.left = rect.left + rect.width / 2 + "px";
                star.style.top = rect.top + rect.height / 2 + "px";
                const angle = (i / 8) * Math.PI * 2;
                star.style.setProperty("--angle", angle);
                star.style.transform = `rotate(${angle}rad) translateX(50px)`;
                document.body.appendChild(star);
                setTimeout(() => star.remove(), 600);
            }
        }

        function shuffleArray(arr) {
            const copy = [...arr];
            for (let i = copy.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [copy[i], copy[j]] = [copy[j], copy[i]];
            }
            return copy;
        }

            app.innerHTML = `

                    <div class="text-center mb-8">
                        <h1 class="text-5xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-600 to-pink-600 mb-2">Deutsch Flashcards</h1>
                        <p class="text-gray-600 text-lg">🇩🇪 Learn German vocabulary like a superstar!</p>
                        ${vocabStatus}
                    </div>

                    <div class="grid grid-cols-2 gap-4 max-w-md w-full">
                        ${Object.entries(VOCABULARY_DB).map(([key, category]) => `
                            <button class="category-btn bg-gradient-to-br ${category.color} rounded-3xl p-6 text-white font-bold text-center shadow-lg hover:shadow-xl transform hover:scale-105 transition-all" data-category="${key}">
                                <div class="text-5xl mb-3">${category.emoji}</div>
                                <div class="text-sm">${category.name}</div>
                            </button>
                        `).join("")}
                    </div>
                </div>
            `;

            document.querySelectorAll(".category-btn").forEach(btn => {
                btn.addEventListener("click", () => startGame(btn.dataset.category));
            });
        }

        function startGame(categoryKey) {
            const category = VOCABULARY_DB[categoryKey];
            appState.selectedCategory = categoryKey;
            appState.deck = shuffleArray(category.words);
            appState.currentCardIndex = 0;
            appState.score = 0;
            appState.completedWords.clear();
            appState.currentScreen = "game";
            renderGame();
        }

        function renderGame() {
            const category = VOCABULARY_DB[appState.selectedCategory];
            const currentCard = appState.deck[appState.currentCardIndex];
            const isFlipped = appState.deck[appState.currentCardIndex]._flipped || false;
            const totalCards = appState.deck.length;
            const progress = ((appState.completedWords.size) / totalCards) * 100;

            if (appState.currentCardIndex >= totalCards) {
                renderComplete();
                return;
            }

            const app = document.getElementById("app");
            app.innerHTML = `
                <div class="min-h-screen flex flex-col px-4 py-6 pb-20">
                    <!-- Header -->
                    <div class="flex justify-between items-center mb-6">
                        <button class="home-btn bg-white rounded-full p-3 shadow-md hover:shadow-lg transition-all" title="Back to home">
                            <span class="text-2xl">🏠</span>
                        </button>
                        <div class="text-center">
                            <h2 class="text-2xl font-bold text-gray-800">${category.emoji} ${category.name.split(" ")[0]}</h2>
                            <p class="text-sm text-gray-500">${appState.completedWords.size + 1} / ${totalCards}</p>
                        </div>
                        <div class="text-center bg-yellow-300 rounded-full px-4 py-2 font-bold text-lg">
                            ⭐ ${appState.score}
                        </div>
                    </div>

                    <!-- Progress bar -->
                    <div class="w-full bg-gray-300 rounded-full h-3 mb-8 overflow-hidden">
                        <div class="bg-gradient-to-r from-purple-500 to-pink-500 h-full transition-all duration-500" style="width: ${progress}%"></div>
                    </div>

                    <!-- Card -->
                    <div class="flex-1 flex items-center justify-center mb-8">
                        <div class="card-container ${isFlipped ? 'flipped' : ''}" id="card" style="width: 320px; height: 380px;">
                            <div class="card-inner">
                                <!-- Front -->
                                <div class="card-front bg-gradient-to-br from-blue-100 to-purple-100 rounded-3xl shadow-2xl border-4 border-white">
                                    <div style="font-size: 12rem" class="mb-4">${currentCard.emoji}</div>
                                    <div class="text-3xl font-bold text-gray-800 text-center mb-3">${currentCard.en}</div>
                                    <div class="text-sm text-gray-700 text-center px-3 mb-2">${currentCard.en_sent || ''}</div>
                                    <div class="text-xs text-red-600 text-center px-3 mb-3">${currentCard.hi_sent || ''}</div>
                                    <p class="text-xs text-gray-500 mt-2">← Tap to flip →</p>
                                </div>
                                <!-- Back -->
                                <div class="card-back bg-gradient-to-br from-pink-100 to-red-100 rounded-3xl shadow-2xl border-4 border-white">
                                    <div style="font-size: 12rem" class="mb-3">${currentCard.emoji}</div>
                                    <div class="text-lg mb-2">
                                        <span class="${getArticleClass(currentCard.article)}">${currentCard.article}</span>
                                        <span class="font-bold text-gray-800"> ${currentCard.de}</span>
                                    </div>
                                    <div class="text-xs text-green-700 text-center px-3 mb-2">${currentCard.de_sent || ''}</div>
                                    <div class="text-xs text-gray-500 mt-3">🔊 Tap to hear</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Navigation buttons -->
                    <div class="flex gap-3 justify-center mb-4">
                        <button class="prev-btn ${appState.currentCardIndex === 0 ? 'opacity-50 cursor-not-allowed' : ''} bg-blue-400 hover:bg-blue-500 text-white font-bold py-2 px-6 rounded-xl shadow-lg transform hover:scale-105 transition-all" ${appState.currentCardIndex === 0 ? 'disabled' : ''}>
                            ⬅️ Previous
                        </button>
                        <button class="next-btn ${appState.currentCardIndex === totalCards - 1 ? 'opacity-50 cursor-not-allowed' : ''} bg-blue-400 hover:bg-blue-500 text-white font-bold py-2 px-6 rounded-xl shadow-lg transform hover:scale-105 transition-all" ${appState.currentCardIndex === totalCards - 1 ? 'disabled' : ''}>
                            Next ➡️
                        </button>
                    </div>

                    <!-- Action buttons -->
                    <div class="flex gap-4 justify-center">
                        <button class="try-again-btn bg-red-500 hover:bg-red-600 text-white font-bold py-4 px-8 rounded-2xl text-xl shadow-lg transform hover:scale-105 transition-all">
                            ❌ Try Again
                        </button>
                        <button class="know-it-btn bg-green-500 hover:bg-green-600 text-white font-bold py-4 px-8 rounded-2xl text-xl shadow-lg transform hover:scale-105 transition-all">
                            ✅ I Know It!
                        </button>
                    </div>
                </div>
            `;

            // Event listeners
            const card = document.getElementById("card");
            card.addEventListener("click", () => {
                card.classList.toggle("flipped");
                appState.deck[appState.currentCardIndex]._flipped = card.classList.contains("flipped");
                if (card.classList.contains("flipped")) {
                    speakGerman(`${currentCard.article} ${currentCard.de}`);
                }
            });

            document.querySelector(".know-it-btn").addEventListener("click", () => {
                createConfetti();
                createStarBurst(event);
                appState.score++;
                appState.completedWords.add(appState.currentCardIndex);
                appState.currentCardIndex++;
                appState.deck[appState.currentCardIndex - 1]._flipped = false;
                renderGame();
            });

            document.querySelector(".try-again-btn").addEventListener("click", () => {
                appState.deck.push(appState.deck.splice(appState.currentCardIndex, 1)[0]);
                appState.deck[appState.currentCardIndex]._flipped = false;
                renderGame();
            });

            document.querySelector(".prev-btn").addEventListener("click", () => {
                if (appState.currentCardIndex > 0) {
                    appState.currentCardIndex--;
                    appState.deck[appState.currentCardIndex]._flipped = false;
                    renderGame();
                }
            });

            document.querySelector(".next-btn").addEventListener("click", () => {
                if (appState.currentCardIndex < appState.deck.length - 1) {
                    appState.currentCardIndex++;
                    appState.deck[appState.currentCardIndex]._flipped = false;
                    renderGame();
                }
            });

            document.querySelector(".home-btn").addEventListener("click", () => {
                appState.currentScreen = "home";
                renderHome();
            });
        }

        function renderComplete() {
            const category = VOCABULARY_DB[appState.selectedCategory];
            const app = document.getElementById("app");
            app.innerHTML = `
                <div class="min-h-screen flex flex-col items-center justify-center px-4 py-8">
                    <div class="text-center">
                        <div class="text-9xl mb-6 animate-bounce">🏆</div>
                        <h1 class="text-5xl font-bold text-gray-800 mb-4">Super gemacht!</h1>
                        <p class="text-2xl text-gray-600 mb-8">You earned ${appState.score} stars!</p>

                        <div class="inline-block bg-gradient-to-r from-yellow-300 to-yellow-400 rounded-3xl px-8 py-6 mb-12 shadow-lg">
                            <p class="text-6xl">⭐ × ${appState.score}</p>
                        </div>

                        <div class="flex gap-4 justify-center">
                            <button class="replay-btn bg-gradient-to-r from-purple-500 to-pink-500 text-white font-bold py-4 px-8 rounded-2xl text-xl shadow-lg hover:shadow-xl transform hover:scale-105 transition-all">
                                🔄 Play Again
                            </button>
                            <button class="home-btn-final bg-gradient-to-r from-blue-500 to-indigo-500 text-white font-bold py-4 px-8 rounded-2xl text-xl shadow-lg hover:shadow-xl transform hover:scale-105 transition-all">
                                🏠 Home
                            </button>
                        </div>
                    </div>
                </div>
            `;

            document.querySelector(".replay-btn").addEventListener("click", () => {
                startGame(appState.selectedCategory);
            });

            document.querySelector(".home-btn-final").addEventListener("click", () => {
                appState.currentScreen = "home";
                renderHome();
            });
        }

        // ============ INITIALIZATION ============
        window.addEventListener("load", async () => {
            if ("serviceWorker" in navigator) {
                const swCode = `
const CACHE_NAME = "deutsch-flashcards-v1";
const ASSETS = ["/", "/index.html"];
self.addEventListener("install", e => { e.waitUntil(caches.open(CACHE_NAME).then(c => c.addAll(ASSETS))); });
self.addEventListener("activate", e => { e.waitUntil(caches.keys().then(names => Promise.all(names.map(name => caches.delete(name))))); });
self.addEventListener("fetch", e => { e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))); });
                `;
                const blob = new Blob([swCode], { type: "application/javascript" });
                const swUrl = URL.createObjectURL(blob);
                navigator.serviceWorker.register(swUrl).catch(() => {});
            }
            // Try to load extended vocabulary
            await loadExtendedVocab();
            renderHome();
        });
    </script>
</body>
</html>
